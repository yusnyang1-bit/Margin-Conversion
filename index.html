<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Margin Live v2.3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #05070a; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); }
        .accent-gradient { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); }
        .shimmer { position: relative; overflow: hidden; }
        .shimmer::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: rotate(45deg); animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }
    </style>
</head>
<body class="text-slate-200 min-h-screen pb-20">

    <nav class="sticky top-0 z-50 px-6 py-4 border-b border-white/5 bg-[#05070a]/80 backdrop-blur-xl">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 accent-gradient rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fas fa-layer-group text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="text-lg font-extrabold tracking-tight text-white leading-none">MARGIN <span class="text-blue-500">SYNC</span></h1>
                    <span id="sync-status" class="text-[10px] text-slate-500 font-mono uppercase tracking-widest">Database Standby</span>
                </div>
            </div>
            <div class="flex gap-3">
                <div class="glass-card px-4 py-2 rounded-2xl text-xs font-mono">
                    <span class="text-slate-500 mr-2">USD/TWD</span>
                    <span id="rate-usd" class="text-emerald-400 font-bold">--</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 mt-8">
        <div class="flex flex-col md:flex-row gap-4 mb-10">
            <div class="relative flex-grow">
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-500"></i>
                <input type="text" id="search" placeholder="搜尋商品名稱或代碼 (如: NQ, 原油)..." 
                    class="w-full bg-white/5 border border-white/10 rounded-2xl pl-14 pr-6 py-5 focus:ring-2 focus:ring-blue-500/50 outline-none text-white transition-all placeholder:text-slate-600">
            </div>
            <button onclick="fetchData()" id="sync-btn" class="accent-gradient hover:opacity-90 px-8 py-5 rounded-2xl font-bold text-white flex items-center justify-center gap-3 shadow-xl shadow-blue-500/10 transition-all active:scale-95">
                <i id="sync-icon" class="fas fa-arrows-rotate"></i>
                <span>同步雲端數據</span>
            </button>
        </div>

        <div class="glass-card rounded-[2.5rem] overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-[11px] text-slate-500 uppercase tracking-[0.2em] bg-white/5">
                            <th class="px-8 py-6">商品詳情</th>
                            <th class="px-8 py-6 text-center">大點價值</th>
                            <th class="px-8 py-6 text-right">原始保證金</th>
                            <th class="px-8 py-6 text-right text-blue-400 bg-blue-500/5">台幣估計 (TWD)</th>
                        </tr>
                    </thead>
                    <tbody id="data-list" class="divide-y divide-white/5">
                        <tr>
                            <td colspan="4" class="py-32 text-center">
                                <div class="flex flex-col items-center gap-4">
                                    <i class="fas fa-cloud-download-alt text-4xl text-slate-700"></i>
                                    <p class="text-slate-500 italic">請點擊上方按鈕，從 Google 試算表同步資料</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <footer class="mt-8 flex justify-between items-center px-4">
            <div id="last-update" class="text-[10px] text-slate-600 font-mono"></div>
            <div class="text-[10px] text-slate-600 font-mono tracking-widest">v2.3.1 STABLE</div>
        </footer>
    </main>

    <script>
        // ！！！請在此處替換為你的 GAS 部署網址 ！！！
        const GAS_URL = "https://script.google.com/macros/s/AKfycbycY_vxaP-8V3ZEgXfxP6IYBNxgtHMblkTf7yTTKWQjaAX-vWKlRljioSRlQw0YMI--4Q/exec";

        let localData = { margins: [], rates: {} };

        async function fetchData() {
            const btn = document.getElementById('sync-btn');
            const icon = document.getElementById('sync-icon');
            const status = document.getElementById('sync-status');
            
            btn.disabled = true;
            icon.classList.add('fa-spin');
            status.innerText = "Syncing with Google Sheets...";

            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                
                localData = data;
                document.getElementById('rate-usd').innerText = data.rates.USD;
                document.getElementById('last-update').innerText = "LAST SYNC: " + data.lastUpdate;
                status.innerText = "Data Up-to-date";
                
                render();
            } catch (error) {
                alert("同步失敗！請檢查 GAS 部署權限是否設為『所有人』。");
                status.innerText = "Sync Failed";
            } finally {
                btn.disabled = false;
                icon.classList.remove('fa-spin');
            }
        }

        function render() {
            const query = document.getElementById('search').value.toLowerCase();
            const container = document.getElementById('data-list');
            
            const filtered = localData.margins.filter(item => 
                (item.name + item.id).toLowerCase().includes(query)
            );

            if (filtered.length === 0) {
                container.innerHTML = `<tr><td colspan="4" class="py-20 text-center text-slate-600">找不到匹配的商品資料</td></tr>`;
                return;
            }

            container.innerHTML = filtered.map(item => {
                const twdValue = Math.round(item.margin * (localData.rates[item.cur] || 1));
                return `
                    <tr class="hover:bg-white/[0.02] transition-colors group">
                        <td class="px-8 py-6">
                            <div class="flex items-center gap-4">
                                <div class="w-2 h-8 rounded-full bg-slate-800 group-hover:bg-blue-500 transition-colors"></div>
                                <div>
                                    <div class="font-bold text-white text-base">${item.name}</div>
                                    <div class="text-xs text-slate-500 font-mono">${item.id}</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-8 py-6 text-center font-mono text-slate-400 text-sm">
                            ${item.pointVal || '--'}
                        </td>
                        <td class="px-8 py-6 text-right">
                            <div class="text-white font-semibold">${item.margin.toLocaleString()}</div>
                            <div class="text-[10px] text-slate-500 font-mono">${item.cur}</div>
                        </td>
                        <td class="px-8 py-6 text-right bg-blue-500/5">
                            <div class="text-xl font-black text-blue-400">
                                <span class="text-xs mr-1 opacity-50">NT$</span>${twdValue.toLocaleString()}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('search').addEventListener('input', render);
    </script>
</body>
</html>
