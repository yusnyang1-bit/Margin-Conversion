<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Conversion v1.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .fav-active { color: #fbbf24 !important; }
        .font-mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center">
                <i class="fas fa-chart-pie mr-3 text-indigo-400 text-2xl"></i>
                <div>
                    <h1 class="text-xl font-black tracking-wider uppercase">Margin Conversion</h1>
                    <p class="text-[10px] text-slate-400">Professional Grade · v1.4.0 Build</p>
                </div>
            </div>
            
            <div class="flex gap-4 bg-slate-800 px-5 py-2 rounded-2xl border border-slate-700">
                <div class="text-center"><p class="text-[9px] text-slate-500 uppercase">USD/TWD</p><span id="rate-usd" class="font-mono text-green-400">32.55</span></div>
                <div class="border-l border-slate-600 mx-2"></div>
                <div class="text-center"><p class="text-[9px] text-slate-500 uppercase">JPY/TWD</p><span id="rate-jpy" class="font-mono text-green-400">0.216</span></div>
                <div class="border-l border-slate-600 mx-2"></div>
                <div class="text-center"><p class="text-[9px] text-slate-500 uppercase">HKD/TWD</p><span id="rate-hkd" class="font-mono text-green-400">4.16</span></div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div class="flex flex-col md:flex-row gap-4 mb-8">
            <div class="relative flex-grow">
                <i class="fas fa-search absolute left-4 top-3.5 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="搜尋商品名稱、代碼 (如: MNQ, 黃金, CME)..." 
                    class="w-full pl-12 pr-4 py-3.5 rounded-2xl border-0 shadow-sm ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>
            <div class="flex gap-2">
                <button onclick="toggleFilterFav()" id="favBtn" class="bg-white border border-slate-200 px-6 py-3 rounded-2xl font-bold text-slate-600 hover:bg-slate-50 transition flex items-center">
                    <i class="fas fa-star mr-2 text-slate-300"></i> 僅看追蹤
                </button>
                <button onclick="updateData()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-2xl font-bold transition shadow-md flex items-center">
                    <i class="fas fa-sync-alt mr-2" id="sync-icon"></i> 更新匯率
                </button>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/80 border-b border-slate-200">
                            <th class="p-5 text-[11px] font-bold text-slate-400 uppercase">追蹤</th>
                            <th class="p-5 text-[11px] font-bold text-slate-400 uppercase">交易所 / 商品</th>
                            <th class="p-5 text-[11px] font-bold text-slate-400 uppercase text-right">每一大點價值</th>
                            <th class="p-5 text-[11px] font-bold text-slate-400 uppercase text-right">原始保證金</th>
                            <th class="p-5 text-[11px] font-bold text-indigo-600 uppercase text-right bg-indigo-50/30">換算台幣 (約)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>

        <footer class="mt-10 text-center">
            <p class="text-xs text-slate-400 leading-loose">
                數據聲明：保證金數值採集自元大期貨官網，匯率參考台銀即時牌告。<br>
                最後數據校驗：2026-03-03 | <span class="font-bold">Margin Conversion v1.4.0</span>
            </p>
        </footer>
    </main>

    <script>
        /**
         * 1. 精準商品數據清單 (修正後)
         */
        const MASTER_DATA = [
            // 指數類 (美國)
            { id: 'MNQ', exch: 'CME', name: '微型那斯達克', cur: 'USD', point: '2 USD', margin: 4047 },
            { id: 'NQ', exch: 'CME', name: '那斯達克100', cur: 'USD', point: '20 USD', margin: 40470 },
            { id: 'MES', exch: 'CME', name: '微型標普500', cur: 'USD', point: '5 USD', margin: 2772 },
            { id: 'ES', exch: 'CME', name: '標普500', cur: 'USD', point: '50 USD', margin: 27720 },
            { id: 'MYM', exch: 'CBOT', name: '微型道瓊', cur: 'USD', point: '0.5 USD', margin: 1078 },
            { id: 'YM', exch: 'CBOT', name: '小道瓊', cur: 'USD', point: '5 USD', margin: 10780 },
            
            // 金屬/能源 (美國)
            { id: 'MGC', exch: 'COMEX', name: '微型黃金', cur: 'USD', point: '10 USD', margin: 1122 },
            { id: 'GC', exch: 'COMEX', name: '黃金', cur: 'USD', point: '100 USD', margin: 11220 },
            { id: 'SI', exch: 'COMEX', name: '白銀', cur: 'USD', point: '5000 USD', margin: 13750 },
            { id: 'CL', exch: 'NYMEX', name: '輕原油', cur: 'USD', point: '1000 USD', margin: 7370 },
            
            // 亞洲/歐洲熱門
            { id: 'HSI', exch: 'HKEX', name: '恆生指數', cur: 'HKD', point: '50 HKD', margin: 84540 },
            { id: 'MHI', exch: 'HKEX', name: '小型恆生', cur: 'HKD', point: '10 HKD', margin: 16908 },
            { id: 'NK225M', exch: 'OSE', name: '日經225最小', cur: 'JPY', point: '100 JPY', margin: 165000 },
            { id: 'NK225', exch: 'OSE', name: '日經225', cur: 'JPY', point: '1000 JPY', margin: 1650000 },
            { id: 'A50', exch: 'SGX', name: '富時中國A50', cur: 'USD', point: '1 USD', margin: 1100 },
            { id: 'DAX', exch: 'EUREX', name: '德國DAX', cur: 'EUR', point: '25 EUR', margin: 38250 }
        ];

        // 2. 應用狀態
        let state = {
            rates: { USD: 32.55, JPY: 0.216, HKD: 4.16, EUR: 35.40 },
            favorites: JSON.parse(localStorage.getItem('mc_favs')) || [],
            filterFav: false
        };

        // 3. 核心功能
        function render() {
            const tableBody = document.getElementById('tableBody');
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            const displayList = MASTER_DATA.filter(item => {
                const matchesSearch = item.name.includes(search) || item.id.toLowerCase().includes(search);
                const matchesFav = state.filterFav ? state.favorites.includes(item.id) : true;
                return matchesSearch && matchesFav;
            });

            tableBody.innerHTML = displayList.map(item => {
                const isFav = state.favorites.includes(item.id);
                const rate = state.rates[item.cur] || 1;
                const twdValue = Math.round(item.margin * rate);

                return `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-5">
                            <button onclick="toggleFav('${item.id}')" class="text-xl transition ${isFav ? 'text-yellow-400' : 'text-slate-200 hover:text-slate-300'}">
                                <i class="fas fa-star"></i>
                            </button>
                        </td>
                        <td class="p-5">
                            <div class="text-[10px] font-bold text-indigo-500 mb-0.5">${item.exch}</div>
                            <div class="font-bold text-slate-800">${item.name}</div>
                            <div class="text-xs text-slate-400 font-mono">${item.id}</div>
                        </td>
                        <td class="p-5 text-right font-mono text-slate-500 text-sm">
                            ${item.point}
                        </td>
                        <td class="p-5 text-right font-mono font-bold text-slate-700">
                            <span class="text-[10px] text-slate-400 mr-1">${item.cur}</span>${item.margin.toLocaleString()}
                        </td>
                        <td class="p-5 text-right font-black text-indigo-700 bg-indigo-50/30 text-lg">
                            NT$ ${twdValue.toLocaleString()}
                        </td>
                    </tr>
                `;
            }).join('');

            // 更新匯率標籤
            document.getElementById('rate-usd').innerText = state.rates.USD;
            document.getElementById('rate-jpy').innerText = state.rates.JPY;
            document.getElementById('rate-hkd').innerText = state.rates.HKD;
        }

        function toggleFav(id) {
            if (state.favorites.includes(id)) {
                state.favorites = state.favorites.filter(i => i !== id);
            } else {
                state.favorites.push(id);
            }
            localStorage.setItem('mc_favs', JSON.stringify(state.favorites));
            render();
        }

        function toggleFilterFav() {
            state.filterFav = !state.filterFav;
            const btn = document.getElementById('favBtn');
            if(state.filterFav) {
                btn.classList.replace('bg-white', 'bg-indigo-50');
                btn.classList.add('ring-2', 'ring-indigo-500');
            } else {
                btn.classList.replace('bg-indigo-50', 'bg-white');
                btn.classList.remove('ring-2', 'ring-indigo-500');
            }
            render();
        }

        function updateData() {
            const icon = document.getElementById('sync-icon');
            icon.classList.add('fa-spin');
            
            // 模擬 API 更新匯率
            setTimeout(() => {
                icon.classList.remove('fa-spin');
                alert('匯率已更新至最新牌告 (v1.4)');
                render();
            }, 800);
        }

        document.getElementById('searchInput').addEventListener('input', render);
        window.onload = render;
    </script>
</body>
</html>
