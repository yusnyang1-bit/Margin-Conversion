<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Margin Conversion v1.5.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-indigo-950 text-white p-4 shadow-2xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="font-black italic tracking-tighter text-xl text-cyan-400">MARGIN CONVERSION</h1>
            <div id="rate-display" class="font-mono text-xs bg-indigo-900 px-4 py-2 rounded-lg border border-indigo-800">
                USD: <span id="u-r">--</span> | JPY: <span id="j-r">--</span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        <div class="flex gap-4 mb-8">
            <input type="text" id="searchInput" placeholder="搜尋商品名稱或代碼 (如: NQ, MNQ)..." 
                class="flex-grow p-4 rounded-2xl shadow-inner border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
            <button onclick="fetchData()" class="bg-indigo-600 text-white px-10 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition">
                <i class="fas fa-sync-alt mr-2" id="sync-icon"></i> 同步
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-slate-400 text-[10px] font-bold uppercase">
                    <tr>
                        <th class="p-5">商品名稱</th>
                        <th class="p-5 text-right">大點價值</th>
                        <th class="p-5 text-right">原始保證金</th>
                        <th class="p-5 text-right bg-indigo-50 text-indigo-600">台幣估計</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    <tr><td colspan="4" class="p-20 text-center text-slate-300">按下同步按鈕開始抓取資料...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        // 請更新此處 URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyHNJ9usu1A8BWhYjqnP00kYHKkuBOSO2yHsCZCRmbYu-BlxH-zPSQZO0xackmeYtlwAg/exec";

        let localData = { margins: [], rates: { USD: 32.55, JPY: 0.21, HKD: 4.15 } };

        async function fetchData() {
            const icon = document.getElementById('sync-icon');
            icon.classList.add('fa-spin');
            
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                
                // 更新匯率顯示
                document.getElementById('u-r').innerText = data.rates.USD;
                document.getElementById('j-r').innerText = data.rates.JPY;

                if (data.margins && data.margins.length > 0) {
                    localData.margins = data.margins;
                    localData.rates = data.rates;
                    render();
                } else {
                    alert("連線成功但抓不到元大數據，請檢查官網。");
                }
            } catch (e) {
                alert("連線失敗！可能是 GAS 權限未設為『所有人』。");
                console.error(e);
            } finally {
                icon.classList.remove('fa-spin');
            }
        }

        function render() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('tableBody');
            
            const filtered = localData.margins.filter(i => (i.name + i.id).toLowerCase().includes(query));

            tbody.innerHTML = filtered.map(item => {
                const twd = Math.round(item.margin * (localData.rates[item.cur] || 1));
                return `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-5">
                            <div class="font-bold text-slate-800">${item.name}</div>
                            <div class="text-[10px] text-slate-400 font-mono">${item.id}</div>
                        </td>
                        <td class="p-5 text-right font-mono text-slate-400 text-sm">${item.pointVal}</td>
                        <td class="p-5 text-right font-mono font-bold text-slate-700">
                            <span class="text-[9px] text-slate-300 mr-1">${item.cur}</span>${item.margin.toLocaleString()}
                        </td>
                        <td class="p-5 text-right font-black text-indigo-700 bg-indigo-50/30 text-lg">
                            NT$ ${twd.toLocaleString()}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', render);
    </script>
</body>
</html>
