<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Super Compact v2.6.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&family=Noto+Sans+TC:wght@500;700;900&display=swap');
        
        :root { --bg: #020617; --card: #1e293b; --text: #f8fafc; --border: #334155; --accent: #3b82f6; --price: #60a5fa; }
        .light-mode { --bg: #ffffff; --card: #f8fafc; --text: #0f172a; --border: #cbd5e1; --accent: #2563eb; --price: #1d4ed8; }

        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.2; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 極致緊湊：移除所有外距 */
        .table-container { overflow-x: auto; height: calc(100vh - 140px); overflow-y: auto; }
        
        /* 凍結首列與強化字體 */
        thead th { 
            position: sticky; top: 0; z-index: 20; 
            background: var(--accent); color: white; 
            font-size: 1rem; padding: 10px 4px !important;
        }
        
        /* 欄位間距最小化 */
        td { padding: 8px 4px !important; border-bottom: 1px solid var(--border); font-size: 1.05rem; }
        .fav-btn { width: 30px; text-align: center; }
        .favorited { color: #fbbf24 !important; }

        /* 隱藏捲軸但保留功能 */
        .table-container::-webkit-scrollbar { width: 0; height: 0; }
    </style>
</head>
<body class="overflow-hidden">

    <nav class="bg-slate-900 text-white px-3 py-2 border-b border-blue-500/50">
        <div class="flex justify-between items-center mb-1">
            <h1 class="font-black italic text-sm tracking-tighter">MARGIN <span class="text-blue-400">PRO</span></h1>
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="text-yellow-400"><i id="theme-icon" class="fas fa-lightbulb"></i></button>
                <button onclick="fetchData()" class="text-white"><i id="sync-icon" class="fas fa-sync-alt"></i></button>
                <span id="ver" class="text-[9px] opacity-50 mono">V2.6.2</span>
            </div>
        </div>
        <div class="flex justify-between items-center bg-black/30 rounded px-2 py-1">
            <div class="text-xs mono">
                USD: <b id="r-u" class="text-emerald-400">--</b> | 
                JPY: <b id="r-j" class="text-blue-400">--</b>
            </div>
            <div id="update-tag" class="text-[9px] opacity-60 mono uppercase tracking-tighter text-right">Waiting...</div>
        </div>
    </nav>

    <main class="px-1">
        <div class="my-1">
            <input type="text" id="search" placeholder="快速搜尋..." 
                class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-base focus:ring-1 focus:ring-blue-500 outline-none text-white">
        </div>

        <div class="table-container shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr>
                        <th class="fav-btn">★</th>
                        <th style="width: 40%">商品(代碼)</th>
                        <th class="text-right">幣別</th>
                        <th class="text-right">原始</th>
                        <th class="text-right" style="background: rgba(0,0,0,0.2)">台幣估計</th>
                    </tr>
                </thead>
                <tbody id="list">
                    <tr><td colspan="5" class="p-10 text-center opacity-50">載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbznaiPus_QbMeKr-iuLSqcDvcxNuvuhB6RZrgK9VSeNh-IBskYRpCvaiugD24qXONM0/exec";
        let state = { 
            margins: [], 
            rates: {}, 
            favorites: JSON.parse(localStorage.getItem('favs') || '[]'),
            theme: localStorage.getItem('theme') || 'dark'
        };

        if (state.theme === 'light') document.body.classList.add('light-mode');

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            state.theme = isLight ? 'light' : 'dark';
            localStorage.setItem('theme', state.theme);
            document.getElementById('theme-icon').className = isLight ? 'fas fa-moon text-slate-400' : 'fas fa-lightbulb text-yellow-400';
        }

        async function fetchData() {
            const icon = document.getElementById('sync-icon');
            icon.classList.add('fa-spin');
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                state.margins = data.margins;
                state.rates = data.rates;
                
                // 強制更新匯率顯示
                document.getElementById('r-u').innerText = data.rates.USD || "--";
                document.getElementById('r-j').innerText = data.rates.JPY || "--";
                document.getElementById('update-tag').innerText = data.lastUpdate.split(' ')[1]; // 只顯示時間縮短長度
                
                render();
            } catch (e) { console.error(e); }
            finally { icon.classList.remove('fa-spin'); }
        }

        function toggleFav(id) {
            const idx = state.favorites.indexOf(id);
            if (idx > -1) state.favorites.splice(idx, 1);
            else state.favorites.push(id);
            localStorage.setItem('favs', JSON.stringify(state.favorites));
            render();
        }

        function render() {
            const q = document.getElementById('search').value.toLowerCase();
            const container = document.getElementById('list');
            
            const sorted = [...state.margins].sort((a, b) => {
                const aFav = state.favorites.includes(a.id) ? 0 : 1;
                const bFav = state.favorites.includes(b.id) ? 0 : 1;
                return aFav - bFav || a.id.localeCompare(b.id);
            });

            const filtered = sorted.filter(i => (i.name + i.id).toLowerCase().includes(q));

            container.innerHTML = filtered.map(item => {
                const isFav = state.favorites.includes(item.id);
                const rate = state.rates[item.cur] || 1;
                const twd = Math.round(item.margin * rate);
                return `
                    <tr class="hover:bg-blue-500/10">
                        <td class="fav-btn">
                            <button onclick="toggleFav('${item.id}')">
                                <i class="fas fa-star ${isFav ? 'favorited' : 'opacity-10'}"></i>
                            </button>
                        </td>
                        <td>
                            <div class="font-bold text-[1.1rem] leading-none text-white">${item.name}</div>
                            <div class="text-[10px] mono opacity-50">${item.id} | ${item.pointVal}</div>
                        </td>
                        <td class="text-right text-[11px] mono opacity-60">${item.cur}</td>
                        <td class="text-right text-base mono font-bold">${item.margin.toLocaleString()}</td>
                        <td class="text-right font-black text-[1.2rem]" style="color: var(--price)">
                            ${twd.toLocaleString()}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('search').addEventListener('input', render);
        fetchData();
    </script>
</body>
</html>
