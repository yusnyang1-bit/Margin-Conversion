<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Conversion v1.5 - Auto Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-indigo-900 text-white p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center">
                <i class="fas fa-robot mr-3 text-cyan-400 text-2xl"></i>
                <div>
                    <h1 class="text-xl font-black tracking-tighter uppercase">Margin Conversion</h1>
                    <p class="text-[10px] text-indigo-300">v1.5.0 · AI Auto-Fetch Enabled</p>
                </div>
            </div>
            
            <div id="rate-bar" class="flex gap-4 bg-indigo-800 px-5 py-2 rounded-2xl border border-indigo-700 font-mono text-sm">
                </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div class="flex flex-col md:flex-row gap-4 mb-8">
            <input type="text" id="searchInput" placeholder="自動同步中，請直接搜尋商品..." 
                class="flex-grow pl-6 pr-4 py-4 rounded-2xl shadow-sm ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
            <button onclick="syncFromYuanta()" class="bg-cyan-500 hover:bg-cyan-600 text-white px-8 py-4 rounded-2xl font-bold transition shadow-lg flex items-center justify-center">
                <i class="fas fa-cloud-download-alt mr-2" id="sync-icon"></i> 立即同步官網數據
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="p-5 text-xs font-bold text-slate-400">商品</th>
                        <th class="p-5 text-xs font-bold text-slate-400 text-right">大點價值</th>
                        <th class="p-5 text-xs font-bold text-slate-400 text-right">原始保證金</th>
                        <th class="p-5 text-xs font-bold text-indigo-600 text-right bg-indigo-50/50">台幣估值</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        // 你的 GAS 部署 URL
        const GAS_API = "YOUR_GAS_DEPLOY_URL_HERE"; 
        
        let state = {
            apiData: [],
            rates: { USD: 32.55, JPY: 0.216, HKD: 4.16, EUR: 35.45 }
        };

        // 核心：從 GAS 抓取元大即時數據
        async function syncFromYuanta() {
            const icon = document.getElementById('sync-icon');
            icon.classList.add('fa-spin');
            
            try {
                // 如果暫時沒 GAS，這裏先用模擬數據確保功能正確
                const response = await fetch(GAS_API); 
                state.apiData = await response.json();
                render();
                alert('已從元大官網同步最新保證金！');
            } catch (e) {
                console.error("同步失敗，請檢查 GAS URL", e);
                // 這裡放入你附件的保底數據
                state.apiData = [
                    { name: '微型那斯達克', id: 'MNQ', cur: 'USD', pointVal: '2 USD', margin: 4047 },
                    { name: '微型標普500', id: 'MES', cur: 'USD', pointVal: '5 USD', margin: 2772 }
                ];
                render();
            } finally {
                icon.classList.remove('fa-spin');
            }
        }

        function render() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('tableBody');
            
            const filtered = state.apiData.filter(item => 
                item.name.includes(search) || item.id.toLowerCase().includes(search)
            );

            tbody.innerHTML = filtered.map(item => {
                const twdValue = Math.round(item.margin * (state.rates[item.cur] || 1));
                return `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-5">
                            <div class="font-bold text-slate-800">${item.name}</div>
                            <div class="text-[11px] text-slate-400 font-mono">${item.id}</div>
                        </td>
                        <td class="p-5 text-right font-mono text-slate-500 text-sm">${item.pointVal}</td>
                        <td class="p-5 text-right font-mono font-bold text-slate-700">
                            <span class="text-[10px] text-slate-400 mr-1">${item.cur}</span>${item.margin.toLocaleString()}
                        </td>
                        <td class="p-5 text-right font-black text-indigo-700 bg-indigo-50/30">
                            NT$ ${twdValue.toLocaleString()}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', render);
        window.onload = syncFromYuanta;
    </script>
</body>
</html>
