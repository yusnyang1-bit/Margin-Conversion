<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Conversion v1.5.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic tracking-widest text-indigo-400">MARGIN CONVERSION</h1>
            <div id="rate-bar" class="text-xs font-mono bg-slate-800 px-4 py-2 rounded-xl border border-slate-700">
                匯率讀取中...
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4">
        <div class="flex flex-col md:flex-row gap-4 mb-6 mt-4">
            <input type="text" id="searchInput" placeholder="搜尋商品代碼或名稱..." 
                class="flex-grow pl-6 pr-4 py-3 rounded-2xl border-0 shadow-sm ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
            <button onclick="fetchData()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-2xl font-bold transition flex items-center justify-center">
                <i class="fas fa-sync-alt mr-2" id="sync-icon"></i> 手動更新
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200 text-slate-400 text-[11px] uppercase">
                        <tr>
                            <th class="p-5">商品名稱 (代碼)</th>
                            <th class="p-5 text-right">一大點價值</th>
                            <th class="p-5 text-right">原始保證金</th>
                            <th class="p-5 text-right bg-indigo-50 text-indigo-600">台幣換算 (約)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
        <p id="lastUpdate" class="text-center text-[10px] text-slate-400 mt-6"></p>
    </main>

    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbynqAOp3jlZDqLMCBLeso5kK-Zb1xul45SQzc-KTPj6Ol92oJlxM1_ZvjbRFii3CyfnEA/exec";

        let localState = {
            margins: [],
            rates: { "USD": 32.5, "JPY": 0.21, "HKD": 4.15 }
        };

        async function fetchData() {
            const icon = document.getElementById('sync-icon');
            icon.classList.add('fa-spin');
            
            try {
                const response = await fetch(GAS_API_URL);
                const data = await response.json();
                console.log("後端回傳原始資料:", data); // 除錯用

                // 修正對接邏輯：容許不同的欄位名稱格式
                localState.margins = data.margins || [];
                localState.rates = data.rates || localState.rates;

                renderRateBar();
                renderTable();
                document.getElementById('lastUpdate').innerText = "最後更新時間: " + (data.lastUpdate || "剛才");
            } catch (e) {
                console.error("渲染出錯:", e);
                alert("資料讀取成功但顯示失敗，請按 F12 查看 Console。");
            } finally {
                icon.classList.remove('fa-spin');
            }
        }

        function renderRateBar() {
            document.getElementById('rate-bar').innerHTML = `
                USD: <span class="text-green-400">${localState.rates.USD || '--'}</span> | 
                JPY: <span class="text-green-400">${localState.rates.JPY || '--'}</span> | 
                HKD: <span class="text-green-400">${localState.rates.HKD || '--'}</span>
            `;
        }

        function renderTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('tableBody');
            
            const filtered = localState.margins.filter(item => {
                const searchStr = (item.name + item.id).toLowerCase();
                return searchStr.includes(query);
            });

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-400">目前沒有資料，請點擊同步按鈕</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(item => {
                // 自動判斷幣別匯率，若無匹配則預設 1
                const rate = localState.rates[item.cur] || 1;
                const twdValue = Math.round(item.margin * rate);

                return `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-5">
                            <div class="font-bold text-slate-800">${item.name}</div>
                            <div class="text-[10px] text-slate-400 font-mono uppercase">${item.id}</div>
                        </td>
                        <td class="p-5 text-right font-mono text-slate-500 text-sm">${item.pointVal}</td>
                        <td class="p-5 text-right font-mono font-bold text-slate-700">
                            <span class="text-[9px] text-slate-400 mr-1">${item.cur}</span>${item.margin.toLocaleString()}
                        </td>
                        <td class="p-5 text-right font-black text-indigo-700 bg-indigo-50/30 text-lg">
                            NT$ ${twdValue.toLocaleString()}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', renderTable);
        window.onload = fetchData;
    </script>
</body>
</html>
