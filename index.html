<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Margin Conversion v1.6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-indigo-900 text-white p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center">
                <i class="fas fa-shield-alt mr-3 text-cyan-400 text-2xl"></i>
                <div>
                    <h1 class="text-xl font-black italic tracking-widest">MARGIN CONVERSION</h1>
                    <span id="ver-tag" class="bg-cyan-500 text-[10px] px-2 py-0.5 rounded-full text-white">Loading...</span>
                </div>
            </div>
            
            <div class="flex gap-4 font-mono text-xs bg-indigo-800 px-5 py-2 rounded-xl border border-indigo-700">
                USD: <span id="r-usd" class="text-green-400">--</span> | 
                JPY: <span id="r-jpy" class="text-green-400">--</span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-6">
        <div class="flex gap-4 mb-6">
            <input type="text" id="searchInput" placeholder="搜尋 NQ, MNQ, YM..." 
                class="flex-grow pl-6 pr-4 py-3.5 rounded-2xl border-0 shadow-sm ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
            <button onclick="fetchData()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-2xl font-bold transition flex items-center shadow-lg">
                <i class="fas fa-sync-alt mr-2" id="sync-icon"></i> 同步資料
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-200 text-slate-400 text-[11px] uppercase">
                    <tr>
                        <th class="p-5">商品名稱 (代碼)</th>
                        <th class="p-5 text-right">一大點價值</th>
                        <th class="p-5 text-right">原始保證金</th>
                        <th class="p-5 text-right bg-indigo-50 text-indigo-600">台幣換算 (預估)</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    <tr><td colspan="4" class="p-20 text-center text-slate-400">尚未同步資料，請點擊同步按鈕</td></tr>
                </tbody>
            </table>
        </div>
        <p id="update-time" class="text-center text-[10px] text-slate-400 mt-6"></p>
    </main>

    <script>
        // 1. 貼上你「新部署」的 URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyLanRIFMP8CNMUH-VZwgwRwtgzODi90a2DD6G_X69IecXrYfxIJYE6wT7PNhZNVruYzQ/exec";

        let state = { margins: [], rates: {} };

        async function fetchData() {
            const icon = document.getElementById('sync-icon');
            icon.classList.add('fa-spin');
            
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();

                state.margins = data.margins;
                state.rates = data.rates;

                // 更新 UI
                document.getElementById('ver-tag').innerText = data.version;
                document.getElementById('r-usd').innerText = data.rates.USD;
                document.getElementById('r-jpy').innerText = data.rates.JPY;
                document.getElementById('update-time').innerText = "最後更新: " + data.lastUpdate;

                renderTable();
            } catch (e) {
                alert("同步失敗！請確認 GAS 是否部署為『所有人』，或檢查網路。");
                console.error(e);
            } finally {
                icon.classList.remove('fa-spin');
            }
        }

        function renderTable() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('tableBody');
            
            const filtered = state.margins.filter(i => (i.name + i.id).toLowerCase().includes(q));

            tbody.innerHTML = filtered.map(item => {
                const rate = state.rates[item.cur] || 1;
                const twd = Math.round(item.margin * rate);
                return `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-5">
                            <div class="font-bold text-slate-800">${item.name}</div>
                            <div class="text-[10px] text-slate-400 font-mono uppercase">${item.id}</div>
                        </td>
                        <td class="p-5 text-right font-mono text-slate-500 text-sm italic">${item.pointVal}</td>
                        <td class="p-5 text-right font-mono font-bold text-slate-700">
                            <span class="text-[9px] text-slate-400 mr-1">${item.cur}</span>${item.margin.toLocaleString()}
                        </td>
                        <td class="p-5 text-right font-black text-indigo-700 bg-indigo-50/30 text-lg">
                            NT$ ${twd.toLocaleString()}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', renderTable);
        window.onload = fetchData;
    </script>
</body>
</html>
